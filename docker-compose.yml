services:
  # 1. Base de Datos PostgreSQL
  attendance-db:
    image: postgres:15
    container_name: attendance-postgres
    environment:
      - POSTGRES_DB=attendance_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432"
    volumes:
      - attendance_data:/var/lib/postgresql/data
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d attendance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend Spring Boot (API)
  attendance-api:
    build: .
    container_name: attendance-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://attendance-db:5432/attendance_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      attendance-db:
        condition: service_healthy
    networks:
      - attendance-network

  # 3. Frontend Nginx (UI)
  attendance-front:
    build: ./attendance-front
    container_name: attendance-ui
    ports:
      - "80:80"
    depends_on:
      - attendance-api
    networks:
      - attendance-network

networks:
  attendance-network:
    driver: bridge

volumes:
  attendance_data:
